services:
  postgres:
    image: postgres:16-alpine
    container_name: wealth-expert-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wealth
      POSTGRES_PASSWORD: wealth
      POSTGRES_DB: wealth_expert
    ports:
      - "5432:5432"
    volumes:
      - wealth_expert_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealth -d wealth_expert"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wealth_expert_postgres:
